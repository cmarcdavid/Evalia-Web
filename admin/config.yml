# ═══════════════════════════════════════════════
# EVALIA MAURITIUS — Decap CMS Configuration
# ═══════════════════════════════════════════════
# This gives you a visual no-code admin panel at:
# yourdomain.com/admin
# Log in with your GitHub account — no password needed
# ═══════════════════════════════════════════════

backend:
  name: github
  repo: cmarcdavid/evalia-web  # GitHub repo
  branch: main

# Where uploaded photos get stored in your repo
media_folder: "images"
public_folder: "/images"

collections:

  # ── PROPERTIES ────────────────────────────────
  - name: "properties"
    label: "🏠 Properties"
    folder: "_data/properties"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Property Name", name: "name", widget: "string"}
      - {label: "Type", name: "type", widget: "select", options: ["Studio", "Villa", "Apartment"]}
      - {label: "Location", name: "location", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Price per Night (€)", name: "price", widget: "number"}
      - {label: "Max Guests", name: "max_guests", widget: "number"}
      - {label: "Bedrooms", name: "bedrooms", widget: "number"}
      - {label: "Bathrooms", name: "bathrooms", widget: "number"}
      - {label: "Main Photo", name: "photo", widget: "image", required: false}
      - {label: "Available", name: "available", widget: "boolean", default: true}
      - label: "Amenities"
        name: "amenities"
        widget: "list"
        field: {label: "Amenity", name: "amenity", widget: "string"}

  # ── EXPERIENCES ───────────────────────────────
  - name: "experiences"
    label: "🌴 Experiences"
    folder: "_data/experiences"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["boat", "nature", "food", "concierge"]}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Price (€)", name: "price", widget: "number"}
      - {label: "Price Unit", name: "unit", widget: "select", options: ["person", "group", "service"]}
      - {label: "Duration", name: "duration", widget: "string", hint: "e.g. Half day, Full day, 3 hours"}
      - {label: "Photo", name: "photo", widget: "image", required: false}
      - {label: "Active", name: "active", widget: "boolean", default: true}

  # ── SITE SETTINGS ─────────────────────────────
  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "_data/settings.json"
        fields:
          - {label: "Business Name", name: "name", widget: "string", default: "Evalia Mauritius"}
          - {label: "WhatsApp Number", name: "whatsapp", widget: "string", default: "+23057000000"}
          - {label: "Email", name: "email", widget: "string", default: "hello@evalia.mu"}
          - {label: "Instagram Handle", name: "instagram", widget: "string"}
          - {label: "Facebook Page", name: "facebook", widget: "string"}
          - {label: "Hero Title Line 1", name: "hero_line1", widget: "string", default: "Your Mauritius,"}
          - {label: "Hero Title Line 2 (italic)", name: "hero_line2", widget: "string", default: "Perfectly Arranged"}
          - {label: "Hero Subtitle", name: "hero_sub", widget: "text"}
          - {label: "Hero Background Photo", name: "hero_photo", widget: "image", required: false}
